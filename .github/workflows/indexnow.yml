name: IndexNow

on:
  push:
    branches: [main]
    paths:
      - "src/content/posts/**/*.md"
  workflow_dispatch:

jobs:
  indexnow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed post files
        id: changed
        run: |
          set -e
          BEFORE="${{ github.event.before }}"
          if [ -n "$BEFORE" ] && [ "$BEFORE" != "0000000000000000000000000000000000000000" ]; then
            CHANGED=$(git diff --name-only --diff-filter=ACMR "$BEFORE" HEAD -- 'src/content/posts/**/*.md' || true)
          else
            CHANGED=$(git ls-files 'src/content/posts/**/*.md' || true)
          fi
          # collapse to single line for output
          CHANGED_LINE=$(echo "$CHANGED" | tr '\n' ' ' | sed 's/[[:space:]]*$//')
          echo "changed=$CHANGED_LINE" >> "$GITHUB_OUTPUT"
          echo "Changed files:"
          echo "$CHANGED"

      - name: Build URLs and submit to IndexNow
        if: steps.changed.outputs.changed != ''
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_SECRET }}
        run: |
          set -euo pipefail

          # strip CR/LF/spaces — secret paste often includes trailing newline
          KEY=$(printf '%s' "${INDEXNOW_KEY:-}" | tr -d '\r\n' | xargs)
          if [ -z "$KEY" ]; then
            echo "INDEXNOW_SECRET is not set"
            exit 1
          fi

          SITE_HOST="upxuu.com"
          SITE_URL="https://${SITE_HOST}"
          KEY_LOCATION="${SITE_URL}/${KEY}.txt"
          CHANGED="${{ steps.changed.outputs.changed }}"

          echo "Changed files: $CHANGED"
          # do not echo the raw key; only show that keyLocation host path is configured
          echo "Key location host: ${SITE_HOST}/<secret>.txt"

          URLS_JSON=$(python3 - <<'PY' "$CHANGED" "$SITE_URL"
          import json, sys, urllib.parse
          from pathlib import Path

          changed = sys.argv[1].split()
          site = sys.argv[2].rstrip("/")
          urls = []
          for f in changed:
              if not f.endswith(".md"):
                  continue
              if not f.startswith("src/content/posts/"):
                  continue
              slug = Path(f).stem
              # encode each path segment (Chinese filenames etc.)
              encoded = urllib.parse.quote(slug, safe="")
              urls.append(f"{site}/posts/{encoded}")
          print(json.dumps(urls, ensure_ascii=False))
          PY
          )

          COUNT=$(python3 -c "import json,sys; print(len(json.loads(sys.argv[1])))" "$URLS_JSON")
          if [ "$COUNT" -eq 0 ]; then
            echo "No valid post URLs to submit"
            exit 0
          fi

          echo "Submitting $COUNT URL(s):"
          python3 -c "import json,sys; [print(' -', u) for u in json.loads(sys.argv[1])]" "$URLS_JSON"

          BODY=$(python3 - <<'PY' "$SITE_HOST" "$KEY" "$KEY_LOCATION" "$URLS_JSON"
          import json, sys
          host, key, key_location, urls_json = sys.argv[1:5]
          payload = {
              "host": host,
              "key": key,
              "keyLocation": key_location,
              "urlList": json.loads(urls_json),
          }
          print(json.dumps(payload, ensure_ascii=False))
          PY
          )

          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST \
            "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$BODY")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          RESP_BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $RESP_BODY"

          # 200 success; 202 accepted
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "202" ]; then
            echo "IndexNow submission failed"
            exit 1
          fi

          echo "IndexNow submission succeeded"
