name: IndexNow

on:
  push:
    branches: [main]
    paths:
      - "src/content/posts/**/*.md"
  workflow_dispatch:

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Submit changed posts to IndexNow
        env:
          KEY: ${{ secrets.INDEXNOW_SECRET }}
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail
          KEY=$(printf '%s' "${KEY:-}" | tr -d '\r\n' | xargs)
          [ -n "$KEY" ] || { echo "INDEXNOW_SECRET not set"; exit 1; }

          # Determine changed files
          if [ "${BEFORE}" != "0000000000000000000000000000000000000000" ]; then
            CHANGED=$(git diff --name-only --diff-filter=ACMR "${BEFORE}" "${AFTER}" -- 'src/content/posts/**/*.md' || true)
          else
            CHANGED=$(git ls-files 'src/content/posts/**/*.md' || true)
          fi

          [ -n "$CHANGED" ] || { echo "No posts changed"; exit 0; }

          # Run Python to extract slugs and submit
          python3 - "$KEY" "$CHANGED" <<'PY'
          import json, sys, urllib.request, urllib.parse, re
          from pathlib import Path

          key = sys.argv[1]
          changed = sys.argv[2].strip().split('\n') if len(sys.argv) > 2 and sys.argv[2].strip() else []

          SITE = "https://upxuu.com"
          HOST = "upxuu.com"

          def read_slug(filepath):
              """Extract slug from frontmatter, fallback to filename stem"""
              try:
                  with open(filepath, 'r', encoding='utf-8') as fh:
                      raw = fh.read(4096)
              except Exception:
                  return Path(filepath).stem

              if not raw.startswith('---'):
                  return Path(filepath).stem

              end = raw.find('---', 3)
              if end == -1:
                  return Path(filepath).stem

              fm = raw[3:end]
              m = re.search(r'^slug:\s*["\']?([^"'\r\n]+)["\']?\s*$', fm, re.MULTILINE)
              if m and m.group(1).strip():
                  return m.group(1).strip()
              return Path(filepath).stem

          urls = []
          seen = set()
          for line in changed:
              f = line.strip()
              if not f or not f.startswith('src/content/posts/') or not f.endswith('.md'):
                  continue
              slug = read_slug(f).lstrip('/')
              url = f"{SITE}/posts/{urllib.parse.quote(slug, safe='')}"
              if url not in seen:
                  seen.add(url)
                  urls.append(url)

          if not urls:
              print("No valid URLs to submit")
              sys.exit(0)

          print(f"Submitting {len(urls)} URL(s):")
          for u in urls:
              print(f"  {u}")

          payload = json.dumps({
              "host": HOST,
              "key": key,
              "keyLocation": f"{SITE}/{key}.txt",
              "urlList": urls,
          }, ensure_ascii=False).encode('utf-8')

          req = urllib.request.Request(
              "https://api.indexnow.org/indexnow",
              data=payload,
              headers={"Content-Type": "application/json; charset=utf-8"},
              method="POST",
          )

          try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                  code = resp.getcode()
                  body = resp.read().decode('utf-8', errors='replace')
                  print(f"HTTP {code}: {body}")
                  if code not in (200, 202):
                      sys.exit(1)
                  print("IndexNow submission succeeded")
          except urllib.error.HTTPError as e:
              code = e.code
              body = e.read().decode('utf-8', errors='replace')
              print(f"HTTP {code}: {body}")
              sys.exit(1)
          PY
