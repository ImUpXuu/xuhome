name: IndexNow

on:
  push:
    branches: [main]
    paths:
      - "src/content/posts/**/*.md"
  workflow_dispatch:

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Submit new / updated posts
        env:
          KEY: ${{ secrets.INDEXNOW_SECRET }}
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail
          KEY=$(printf '%s' "${KEY:-}" | tr -d '\r\n' | xargs)
          [ -n "$KEY" ] || { echo "INDEXNOW_SECRET not set"; exit 1; }

          if [ "${BEFORE}" != "0000000000000000000000000000000000000000" ]; then
            FILES=$(git diff --name-only --diff-filter=ACMR "${BEFORE}" "${AFTER}" -- 'src/content/posts/' || true)
          else
            FILES=$(git ls-files 'src/content/posts/' || true)
          fi

          [ -n "$FILES" ] || { echo "No posts changed"; exit 0; }

          echo "$FILES" > /tmp/changed.txt
          export IDX_KEY="$KEY"
          python3 /tmp/changed.txt "$IDX_KEY" <<'PY'
          import json, sys, re, os
          import urllib.request, urllib.error, ssl
          from pathlib import Path

          ssl._create_default_https_context = ssl._create_unverified_context

          SITE = "https://upxuu.com"
          KEY = os.environ.get("IDX_KEY", "")
          if not KEY:
              print("KEY not set"); sys.exit(1)

          def read_slug(filepath):
              try:
                  with open(filepath, "r", encoding="utf-8") as fh:
                      raw = fh.read(4096)
              except Exception:
                  return Path(filepath).stem
              if not raw.startswith("---"):
                  return Path(filepath).stem
              end = raw.find("---", 3)
              if end == -1:
                  return Path(filepath).stem
              fm = raw[3:end]
              m = re.search(r'^slug:\s*[\"\']?([^\"\'\\r\\n]+)', fm, re.MULTILINE)
              if m and m.group(1).strip():
                  return m.group(1).strip()
              return Path(filepath).stem

          with open("/tmp/changed.txt", "r") as f:
              lines = [l.strip() for l in f.readlines()]

          urls = []
          for f in lines:
              if not f.startswith("src/content/posts/") or not f.endswith(".md"):
                  continue
              slug = read_slug(f)
              urls.append(f"{SITE}/posts/{slug}/")

          if not urls:
              print("No URLs to submit"); sys.exit(0)

          print(f"\nSubmitting {len(urls)} URL(s):")
          for u in urls:
              print(f"  {u}")

          payload = json.dumps({
              "host": "upxuu.com",
              "key": KEY,
              "keyLocation": f"{SITE}/{KEY}.txt",
              "urlList": urls,
          }, ensure_ascii=False).encode("utf-8")

          req = urllib.request.Request(
              "https://api.indexnow.org/indexnow",
              data=payload,
              headers={"Content-Type": "application/json; charset=utf-8"},
              method="POST",
          )
          try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                  code = resp.getcode()
                  body = resp.read().decode("utf-8", errors="replace")
                  print(f"HTTP {code} {body}")
                  sys.exit(0 if code in (200, 202) else 1)
          except urllib.error.HTTPError as e:
              print(f"HTTP {e.code} {e.read().decode('utf-8', errors='replace')}")
              sys.exit(1)
          PY
