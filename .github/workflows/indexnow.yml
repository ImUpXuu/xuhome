name: IndexNow

on:
  push:
    branches: [main]
    paths:
      - "src/content/posts/**/*.md"
  workflow_dispatch:

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed posts
        id: changed
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"
          if [ "$BEFORE" != "0000000000000000000000000000000000000000" ]; then
            CHANGED=$(git diff --name-only --diff-filter=ACMR "$BEFORE" "$AFTER" -- 'src/content/posts/**/*.md' || true)
          else
            CHANGED=$(git ls-files 'src/content/posts/**/*.md' || true)
          fi
          {
            echo "changed<<EOF"
            echo "$CHANGED"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Submit to IndexNow
        if: steps.changed.outputs.changed != ''
        env:
          KEY: ${{ secrets.INDEXNOW_SECRET }}
          CHANGED: ${{ steps.changed.outputs.changed }}
        run: |
          set -euo pipefail
          KEY=$(printf '%s' "${KEY:-}" | tr -d '\r\n' | xargs)
          [ -n "$KEY" ] || { echo "INDEXNOW_SECRET not set"; exit 1; }

          SITE="https://upxuu.com"
          KEY_LOCATION="${SITE}/${KEY}.txt"

          python3 - "$KEY" "$KEY_LOCATION" "$SITE" "$CHANGED" <<'PY'
          import json, sys, urllib.parse
          from pathlib import Path

          key, key_loc, site, *rest = sys.argv[1:]
          changed = rest[0].split() if rest else []
          host = site.replace("https://", "")

          urls = []
          for f in changed:
              if not f.endswith(".md") or not f.startswith("src/content/posts/"):
                  continue
              slug = Path(f).stem
              urls.append(f"{site}/posts/{urllib.parse.quote(slug, safe='')}")

          if not urls:
              print("No URLs to submit")
              sys.exit(0)

          print(f"Submitting {len(urls)} URL(s):")
          for u in urls:
              print(f"  {u}")

          payload = json.dumps({
              "host": host,
              "key": key,
              "keyLocation": key_loc,
              "urlList": urls,
          }, ensure_ascii=False)

          import subprocess
          r = subprocess.run([
              "curl", "-sS", "-w", "\n%{http_code}",
              "https://api.indexnow.org/indexnow",
              "-H", "Content-Type: application/json; charset=utf-8",
              "-d", payload,
          ], capture_output=True, text=True)

          lines = r.stdout.strip().split("\n")
          code = lines[-1]
          body = "\n".join(lines[:-1])
          print(f"HTTP {code}: {body}")
          if code not in ("200", "202"):
              sys.exit(1)
          print("IndexNow submission succeeded")
          PY
