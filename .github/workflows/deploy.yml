name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  TARGET_DIR: /var/www/upxuu

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      commit: ${{ steps.commit.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm@9

      - run: pnpm install --no-frozen-lockfile

      # IndexNow key must be public on the live site, but NOT stored in the public git repo.
      # Write key file from secret at build time so dist/ includes it after deploy.
      - name: Write IndexNow key file
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_SECRET }}
        run: |
          if [ -z "${INDEXNOW_KEY:-}" ]; then
            echo "INDEXNOW_SECRET not set — skip key file"
            exit 0
          fi
          printf '%s' "$INDEXNOW_KEY" > "public/${INDEXNOW_KEY}.txt"
          echo "Wrote public/${INDEXNOW_KEY}.txt"

      - run: pnpm build

      - name: Save commit SHA
        id: commit
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      # 加服务器：复制一段 include，改 host / name 即可
      # 所有机器共用 secrets.SERVER_SSH_KEY（私钥）+ secrets.SERVER_USER
      matrix:
        include:
          - host: 38.76.185.215
            name: server-1
          - host: 154.219.110.223
            name: server-2
          - host: 8.220.197.92
            name: server-3
      fail-fast: false
    name: deploy → ${{ matrix.name }} (${{ matrix.host }})
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          # 保留私钥换行；去掉 Windows 可能带来的 \r
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ matrix.host }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Ensure directory exists on ${{ matrix.host }}
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=15 \
            "${{ secrets.SERVER_USER }}@${{ matrix.host }}" \
            "mkdir -p ${{ env.TARGET_DIR }}"

      - name: Sync to ${{ matrix.host }}
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o ConnectTimeout=15" \
            dist/ \
            "${{ secrets.SERVER_USER }}@${{ matrix.host }}:${{ env.TARGET_DIR }}/"
