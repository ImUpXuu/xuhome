name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  TARGET_DIR: /var/www/upxuu

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      commit: ${{ steps.commit.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm@9

      - run: pnpm install --no-frozen-lockfile

      - run: pnpm build

      - name: Save commit SHA
        id: commit
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        host: [38.76.185.215, 154.219.110.223]
      fail-fast: false
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ matrix.host }} >> ~/.ssh/known_hosts

      - name: Ensure directory exists on ${{ matrix.host }}
        run: |
          ssh -i ~/.ssh/deploy_key \
            "${{ secrets.SERVER_USER }}@${{ matrix.host }}" \
            "mkdir -p ${{ env.TARGET_DIR }}"

      - name: Sync to ${{ matrix.host }}
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            dist/ \
            "${{ secrets.SERVER_USER }}@${{ matrix.host }}:${{ env.TARGET_DIR }}/"
