name: Deploy
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - run: pnpm install
      - run: pnpm build
      - uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_KEY }}
          ARGS: -avz --delete
          SOURCE: dist/
          REMOTE_HOST: ${{ secrets.HOST }}
          REMOTE_USER: root
          TARGET: /var/www/upxuu
      - run: ssh root@${{ secrets.HOST }} "systemctl reload nginx || :"
